services:
  postgres:
    image: postgres:15
    container_name: talk2dom-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: talk2dom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d talk2dom"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: talk2dom-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  talk2dom-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      T2D_REDIS_URL: redis://redis:6379/0
      TALK2DOM_DB_URI: postgresql://admin:secret@postgres:5432/talk2dom

volumes:
  postgres_data:
  redis_data: